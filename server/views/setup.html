<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initialize Admin</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .wrap { max-width: 520px; margin: 5rem auto; background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 1rem; font-size: 1.5rem; }
    p { color: #555; }
    label { display: block; font-weight: 600; margin: .75rem 0 .25rem; }
    input { width: 100%; padding: .75rem 1rem; border-radius: 8px; border: 1px solid #ddd; }
    button { margin-top: 1rem; background: #6c3baa; color: #fff; border: 0; border-radius: 999px; padding: .75rem 1.25rem; font-weight: 600; }
  </style>
  </head>
<body>
  <div class="wrap">
    <h1>Create Admin User</h1>
    <p>No users found. Create the first admin to initialize the dashboard.</p>
    <form method="post" action="/setup">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <button type="submit">Create Admin</button>
    </form>
  </div>
</body>
</html>
